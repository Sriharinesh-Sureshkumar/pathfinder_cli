name: CI

on:
  push:
    branches: [main, build]
  pull_request:
    branches: [main, build]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: pytest tests/ -v
